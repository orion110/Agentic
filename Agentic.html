<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic ✦ </title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #0a0a0a;
    --white: #ffffff;
    --page-bg: #f8f8f6;
    --surface: #ffffff;
    --border-light: rgba(0,0,0,0.08);
    --border-mid: rgba(0,0,0,0.14);
    --text-primary: #0a0a0a;
    --text-secondary: #6b6b6b;
    --text-muted: #a0a0a0;
    --font: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  html, body {
    background: var(--page-bg);
    color: var(--text-primary);
    font-family: var(--font);
    overflow-x: hidden;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    padding: 0 24px 0 0;
    height: 52px;
    background: #000000;
    gap: 16px;
  }

  .nav-spacer {
    flex: 1;
  }

  .nav-brand {
    display: flex;
    align-items: center;
    text-decoration: none;
    flex-shrink: 0;
    margin-left: 10px;
  }

  .nav-logo {
    display: block;
    height: 38px;
    width: auto;
    max-width: 220px;
    color: #fff;
    flex-shrink: 0;
  }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .nav-links a {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    letter-spacing: 0.04em;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: #fff; }

  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 100px 0 0;
    background: var(--white);
    border-bottom: 1px solid var(--border-light);
    position: relative;
  }

  .terminal-section {
    padding: 0;
    width: 100%;
    margin: 0;
  }

  .hero-logo {
    display: block;
    width: min(50vw, 320px);
    height: auto;
    margin: 0 auto 40px;
    user-select: none;
    color: #0a0a0a;
  }

  .hero-sub {
    font-size: 16px;
    font-weight: 300;
    color: var(--text-secondary);
    max-width: 400px;
    line-height: 1.65;
    margin: 0 auto 44px;
    letter-spacing: 0.02em;
  }

  .hero-cta {
    display: flex;
    gap: 14px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-block;
    padding: 13px 36px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.07em;
    border-radius: 4px;
    cursor: pointer;
    text-decoration: none;
    border: 1px solid transparent;
    transition: all 0.18s ease;
  }

  .btn-primary {
    background: var(--black);
    color: #fff;
    border-color: var(--black);
  }

  .btn-primary:hover { background: #222; }

  .btn-secondary {
    background: transparent;
    color: var(--text-primary);
    border-color: var(--border-mid);
  }

  .btn-secondary:hover { background: #f0f0ee; border-color: rgba(0,0,0,0.25); }

  .scroll-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .scroll-hint span {
    font-size: 10px;
    letter-spacing: 0.22em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .scroll-arrow {
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3), transparent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .specs {
    background: var(--white);
    border-bottom: 1px solid var(--border-light);
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
  }

  .spec-item {
    flex: 1;
    min-width: 150px;
    text-align: center;
    padding: 40px 28px;
    border-right: 1px solid var(--border-light);
  }

  .spec-item:last-child { border-right: none; }

  .spec-value {
    font-size: 34px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    font-family: 'Courier New', monospace;
    line-height: 1;
    margin-bottom: 8px;
  }

  .spec-label {
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .terminal {
    background: #0d0d0d;
    border-radius: 0;
    overflow: hidden;
    border: none;
    box-shadow: none;
    font-family: 'Courier New', Courier, monospace;
    width: 100%;
  }

  .term-titlebar {
    background: #1e1e1e;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid #333;
  }

  .term-btn {
    width: 12px;
    height: 12px;
    border-radius: 50%;
  }

  .term-btn.red { background: #ff5f57; }
  .term-btn.yellow { background: #febc2e; }
  .term-btn.green { background: #28c840; }

  .term-title {
    flex: 1;
    text-align: center;
    font-size: 12px;
    color: #888;
    letter-spacing: 0.06em;
  }

  .tab-bar {
    display: flex;
    align-items: stretch;
    background: #161616;
    border-bottom: 1px solid #1e1e1e;
    overflow-x: auto;
    flex-shrink: 0;
    scrollbar-width: none;
  }

  .tab-bar::-webkit-scrollbar { display: none; }

  .term-tab {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    width: 44px;
    padding: 10px 0;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12.5px;
    color: #777;
    background: transparent;
    border-right: 1px solid #1e1e1e;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }

  .term-tab:hover { background: #1a1a1a; color: #bbb; }

  .term-tab.active {
    background: #0d0d0d;
    color: #fff;
    box-shadow: inset 0 -2px 0 #ffffff;
  }

  .term-tab-num {
    font-weight: 600;
  }

  .term-tab-close {
    display: none;
    color: #555;
    font-size: 14px;
    line-height: 1;
    padding: 2px 4px;
    border-radius: 3px;
  }

  .term-tab:hover .term-tab-num,
  .term-tab.active .term-tab-num {
    display: none;
  }

  .term-tab:hover .term-tab-close,
  .term-tab.active .term-tab-close {
    display: inline;
  }

  .term-tab-close:hover { background: #333; color: #fff; }

  .term-tab-add {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    flex-shrink: 0;
    color: #666;
    cursor: pointer;
    font-size: 16px;
    transition: background 0.15s, color 0.15s;
  }

  .term-tab-add:hover { background: #1a1a1a; color: #fff; }

  .term-output {
    padding: 24px 32px;
    height: calc(100vh - 60px - 76px - 44px);
    overflow-y: auto;
    font-size: 14px;
    line-height: 1.6;
    color: #e0e0e0;
    white-space: pre-wrap;
    word-break: break-word;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    text-align: left;
  }

  .term-output::-webkit-scrollbar { width: 6px; }
  .term-output::-webkit-scrollbar-track { background: #0d0d0d; }
  .term-output::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

  .term-line { margin: 0; }
  .term-line.prompt { color: #ffffff; }
  .term-line.output { color: #cccccc; }
  .term-line.error { color: #ff5f57; }
  .term-line.info { color: #ffffff; }
  .term-line.dim { color: #555; }

  .term-input-row {
    display: flex;
    align-items: center;
    padding: 12px 32px 16px;
    border-top: 1px solid #1e1e1e;
    gap: 8px;
    position: relative;
  }

  .term-prompt-label {
    color: #ffffff;
    font-size: 14px;
    white-space: nowrap;
    font-family: 'Courier New', monospace;
  }

  .term-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    caret-color: #ffffff;
  }

  .term-input::placeholder { color: #444; }

  @keyframes slashPopIn {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .slash-dropdown {
    display: none;
    position: absolute;
    left: 32px;
    right: 32px;
    bottom: calc(100% + 10px);
    background: rgba(24, 24, 26, 0.88);
    backdrop-filter: blur(18px) saturate(160%);
    -webkit-backdrop-filter: blur(18px) saturate(160%);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    overflow: hidden;
    max-height: 280px;
    z-index: 50;
    box-shadow: 0 16px 40px rgba(0,0,0,0.55), 0 2px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
    flex-direction: column;
    transform-origin: bottom left;
  }

  .slash-dropdown.open {
    display: flex;
    animation: slashPopIn 0.16s cubic-bezier(0.16, 1, 0.3, 1) both;
  }

  .slash-dropdown-header {
    padding: 10px 14px 8px;
    font-family: var(--font);
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: #7a7a80;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .slash-list {
    overflow-y: auto;
    padding: 4px 6px 6px;
    scrollbar-width: thin;
  }

  .slash-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 9px;
    cursor: pointer;
    font-family: var(--font);
    border-radius: 8px;
    transition: background 0.1s ease;
  }

  .slash-item:hover,
  .slash-item.active {
    background: rgba(255,255,255,0.08);
  }

  .slash-item.active {
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.08);
  }

  .slash-item-icon {
    width: 24px;
    height: 24px;
    border-radius: 7px;
    background: linear-gradient(160deg, #3a3a3e, #232326);
    color: #d6a568;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Courier New', Courier, monospace;
    font-size: 12px;
    font-weight: 700;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    transition: transform 0.12s ease, background 0.12s ease;
  }

  .slash-item.active .slash-item-icon {
    background: linear-gradient(160deg, #4a4a4e, #2a2a2d);
    color: #eec98a;
    transform: scale(1.06);
  }

  .slash-item-text {
    display: flex;
    flex-direction: column;
    min-width: 0;
    flex: 1;
    gap: 1px;
  }

  .slash-item-cmd {
    color: #f2f2f0;
    font-weight: 600;
    font-size: 13.5px;
    line-height: 1.3;
    font-family: 'Courier New', Courier, monospace;
  }

  .slash-item-desc {
    color: #8a8a8f;
    font-size: 11.5px;
    line-height: 1.3;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .slash-item-hint {
    flex-shrink: 0;
    font-size: 10px;
    color: #666;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px;
    padding: 1px 5px;
    opacity: 0;
    transition: opacity 0.12s ease;
  }

  .slash-item.active .slash-item-hint { opacity: 1; }

  .slash-empty {
    padding: 16px 14px;
    color: #6d6d72;
    font-size: 12.5px;
    font-family: var(--font);
  }

  /* ── Upload button – Orion chat ── */
  .orion-upload-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid rgba(0,0,0,0.12);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    flex-shrink: 0;
  }
  .orion-upload-btn:hover {
    background: #f0f0ee;
    color: var(--text-primary);
    border-color: rgba(0,0,0,0.22);
  }

  /* ── File preview chip – Orion chat ── */
  .orion-file-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 10px 5px 8px;
    margin: 0 12px 8px;
    background: #f3f3f1;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-secondary);
    max-width: 320px;
    width: fit-content;
  }
  .orion-file-chip-name {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 220px;
  }
  .orion-file-chip-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1;
    padding: 0;
    flex-shrink: 0;
  }
  .orion-file-chip-remove:hover { color: #e53e3e; }

  /* ── Queued message chip – shown above the composer while a response streams ── */
  .orion-queued-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 10px 6px 8px;
    margin: 0 12px 8px;
    background: #f3f3f1;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    font-size: 12px;
    color: var(--text-secondary);
  }
  .orion-queued-chip-text {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .orion-queued-chip-remove {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-muted);
    font-size: 14px;
    line-height: 1;
    padding: 0;
    flex-shrink: 0;
  }
  .orion-queued-chip-remove:hover { color: #e53e3e; }
  body.dark-mode .orion-queued-chip { background: #1e1e1e; border-color: rgba(255,255,255,0.1); color: #aaa; }

  /* ── Message action bar ── */
  .orion-msg-actions {
    display: flex;
    align-items: center;
    gap: 2px;
    margin-top: 6px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .orion-msg-row.ai:hover .orion-msg-actions { opacity: 1; }
  .orion-action-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    transition: background 0.12s, color 0.12s;
    position: relative;
  }
  .orion-action-btn:hover { background: #f0f0ee; color: var(--text-primary); }
  .orion-action-btn.active { color: var(--text-primary); }
  .orion-action-btn svg { pointer-events: none; }

  /* More-actions popover */
  .orion-more-popover {
    position: absolute;
    bottom: calc(100% + 6px);
    left: 0;
    background: #fff;
    border: 1px solid rgba(0,0,0,0.1);
    border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    min-width: 150px;
    z-index: 200;
    overflow: hidden;
  }
  .orion-more-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 9px 14px;
    font-size: 13px;
    color: var(--text-primary);
    cursor: pointer;
    white-space: nowrap;
  }
  .orion-more-item:hover { background: #f5f5f3; }
  .orion-more-item svg { flex-shrink: 0; color: var(--text-secondary); }

  footer {
    padding: 28px 40px;
    border-top: 1px solid var(--border-light);
    background: #000000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
  }

  .footer-logo {
    font-family: 'Courier New', monospace;
    font-size: 5.5px;
    line-height: 1.25;
    color: #ffffff;
    white-space: pre;
    letter-spacing: 0;
    display: block;
  }

  .footer-note {
    font-size: 12px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.04em;
  }

  .how-it-works {
    display: flex;
    align-items: center;
    gap: 0;
    margin: 48px auto 0;
    max-width: 720px;
    width: 100%;
    padding: 0 40px;
  }

  .how-step {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    flex: 1;
    text-align: left;
  }

  .how-num {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    font-weight: 700;
    color: rgba(0,0,0,0.2);
    letter-spacing: 0.1em;
    padding-top: 2px;
    flex-shrink: 0;
  }

  .how-title {
    font-size: 14px;
    font-weight: 500;
    color: #0a0a0a;
    margin-bottom: 6px;
    letter-spacing: 0.01em;
  }

  .how-desc {
    font-size: 13px;
    font-weight: 300;
    color: #888;
    line-height: 1.6;
  }

  .how-desc code {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    background: rgba(0,0,0,0.06);
    padding: 1px 5px;
    border-radius: 3px;
    color: #555;
  }

  .how-divider {
    width: 40px;
    height: 1px;
    background: rgba(0,0,0,0.1);
    flex-shrink: 0;
    margin: 0 8px;
    margin-top: 10px;
    align-self: flex-start;
  }

  .hero-spacer {
    width: 100%;
    height: 1px;
    background: rgba(0,0,0,0.08);
    margin-top: 60px;
  }

  .toast {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.12);
    border-left: 3px solid #ff5f57;
    color: rgba(255,255,255,0.75);
    font-family: 'Courier New', monospace;
    font-size: 12px;
    padding: 12px 18px;
    border-radius: 4px;
    max-width: 320px;
    line-height: 1.5;
    z-index: 999;
    opacity: 0;
    transform: translateX(20px);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(0);
  }

  html { scroll-behavior: smooth; }

  @media (max-width: 640px) {
    nav { padding: 0 16px; height: 56px; }
    .nav-logo {
      display: block;
      height: 30px;
      max-width: 130px;
    }

    .hero { padding: 76px 0 0; }
    .hero-logo {
      width: min(76vw, 360px);
      margin-bottom: 28px;
    }
    .hero-sub { font-size: 14px; max-width: 90%; margin: 0 auto 32px; padding: 0 20px; }

    .how-it-works {
      flex-direction: column;
      align-items: stretch;
      gap: 20px;
      max-width: 100%;
      padding: 0 24px;
      margin: 32px auto 0;
    }
    .how-step { text-align: left; }
    .how-divider { display: none; }

    .hero-spacer { margin-top: 32px; }

    .term-output {
      padding: 16px 16px;
      height: calc(100vh - 56px - 44px - 60px);
      font-size: 13.5px;
    }

    .tab-bar { overflow-x: auto; }
    .term-tab { width: 38px; }
    .term-tab-add { width: 32px; }

    .term-input-row { padding: 10px 16px 14px; }
    .term-prompt-label { font-size: 13px; }
    .term-input { font-size: 16px; }

    .slash-dropdown { left: 16px; right: 16px; max-height: 200px; }
    .slash-item-desc { display: none; }

    .toast { left: 16px; right: 16px; bottom: 20px; max-width: none; }
  }

  /* ── MODE TOGGLE ── */
  .mode-toggle {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .mode-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border-radius: 999px;
    border: none;
    background: transparent;
    color: rgba(255,255,255,0.45);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
  }
  .mode-btn:hover { color: rgba(255,255,255,0.8); }
  .mode-btn.active {
    background: #ffffff;
    color: #000000;
  }
  .mode-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

  /* ── DARK MODE ── */
  body.dark-mode {
    --page-bg: #111111;
    --surface: #1a1a1a;
    --border-light: rgba(255,255,255,0.08);
    --border-mid: rgba(255,255,255,0.14);
    --text-primary: #e8e8e8;
    --text-secondary: #aaa;
    --text-muted: #666;

  /* Extension panel — self-contained mini-apps launched from the icon rail,
     rendered as a small floating widget (not a full drawer) so something
     like a music visualizer can keep running in the background, out of the
     way, while the rest of the app stays fully usable. */
  .extension-panel {
    position: fixed;
    bottom: 16px; right: 16px;
    width: 300px;
    height: 150px;
    max-width: calc(100vw - 32px);
    max-height: calc(100vh - 32px);
    background: var(--surface);
    border: 1px solid var(--border-mid);
    border-radius: 14px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.18);
    z-index: 1200;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transform: translateY(16px) scale(0.96);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.18s cubic-bezier(.4,0,.2,1), opacity 0.18s ease;
  }
  .extension-panel.open { transform: translateY(0) scale(1); opacity: 1; pointer-events: all; }
  .extension-panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    border-bottom: 1px solid var(--border-light);
    flex-shrink: 0;
  }
  .extension-panel-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-primary);
  }
  .extension-panel-close {
    width: 20px;
    height: 20px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: color 0.15s;
  }
  .extension-panel-close:hover { color: var(--text-primary); }
  .extension-panel-content {
    flex: 1;
    overflow: hidden;
  }

  body.dark-mode .extension-panel { background: #1a1a1a; border-color: #2a2a2a; }
  body.dark-mode .extension-panel-header { border-bottom-color: #2a2a2a; }
  body.dark-mode .extension-panel-title { color: #e8e8e8; }
  body.dark-mode .extension-panel-close { color: #666; }
  body.dark-mode .extension-panel-close:hover { color: #aaa; }

  /* ──────────────────────────────────────
     ORION CHAT SIDEBAR

  .orion-sidebar {
    position: fixed;
    left: 0;
    top: 0;
    width: 240px;
    height: 100vh;
    background: #fff;
    border-right: 1px solid var(--border-light);
    z-index: 50;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .orion-sidebar-brand {
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #0a0a0a;
    border-bottom: 1px solid var(--border-light);
    text-transform: uppercase;
  }

  .orion-nav-list {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 6px 8px;
    border-bottom: 1px solid var(--border-light);
    overflow-y: auto;
    overflow-x: hidden;
    flex: 1;
    scrollbar-width: thin;
  }

  .orion-section-label {
    padding: 10px 16px 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #aaa;
    text-transform: uppercase;
  }

  .orion-nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border-radius: 6px;
    font-size: 12px;
    color: #666;
    cursor: pointer;
    transition: background 0.12s, color 0.12s;

    overflow: hidden;

  }

  .orion-nav-item svg {
    width: 14px;
    height: 14px;
    flex-shrink: 0;
    color: #999;
  }

  .orion-nav-item:hover { background: #f0f0ee; color: #333; }

  .orion-nav-item.active {
    background: #e8e8e8;
    color: #0a0a0a;

  .orion-sidebar-footer {
    padding: 8px;

    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: #bbb;

  .orion-sidebar-footer button {
    flex: 1;
    padding: 6px;
    border-radius: 4px;
    border: 1px solid var(--border-light);
    background: transparent;
    color: var(--text-secondary);
    font-size: 10px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;

  .orion-sidebar-footer button:hover {
    background: #f0f0ee;
    border-color: rgba(0,0,0,0.15);
  }

  /* ──────────────────────────────────────
     ORION CHAT MAIN AREA
     ────────────────────────────────────── */

  .orion-main {
    margin-left: 240px;
    background: #fff;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  .orion-welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 40px;
    text-align: center;
  }

  .orion-welcome h2 {
    font-size: 20px;
    font-weight: 600;
    color: #0a0a0a;
  }

  .orion-welcome p {
    font-size: 13px;
    color: #888;
    max-width: 300px;
    line-height: 1.6;
  }

  .orion-messages {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    padding: 20px 40px;
    display: none;
  }

  .orion-msg-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .orion-msg-row.user {
    justify-content: flex-end;
    background: transparent;
  }

  .orion-msg-row.ai {
    justify-content: flex-start;
    background: transparent;
  }

  .orion-msg-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 600;
  }

  .orion-msg-avatar.ai-av {
    background: #e8e8e8;
    color: #666;
    border: 1px solid #ddd;
  }

  .orion-msg-avatar.user-av {
    background: #0a0a0a;
    color: #fff;
  }

  .orion-msg-content {
    max-width: 70%;
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 13px;
    line-height: 1.5;
    word-wrap: break-word;
    color: #0a0a0a;
  }

  .orion-msg-row.user .orion-msg-content {
    background: #0a0a0a;
    color: #fff;
    border-radius: 14px 4px 14px 14px;
  }

  .orion-msg-row.ai .orion-msg-content {
    background: transparent;
    color: #0a0a0a;
  }

  .orion-msg-content code {
    background: rgba(0,0,0,0.06);

    border-radius: 4px;
    font-family: 'Courier New', monospace;

  .orion-msg-content pre {
    background: rgba(0,0,0,0.08);
    border: 1px solid rgba(0,0,0,0.1);
    padding: 10px;
    border-radius: 6px;
    overflow-x: auto;
    font-size: 12px;
    font-family: 'Courier New', monospace;
    margin: 6px 0;
  }

  .orion-msg-content blockquote {
    border-left: 3px solid #ddd;
    padding-left: 10px;
    margin: 6px 0;
    color: #888;
  }

  .orion-msg-content ul, .orion-msg-content ol {
    margin: 6px 0;
    padding-left: 20px;
  }

  .orion-code-block {
    background: #f5f5f3;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    overflow: hidden;
    margin: 8px 0;
  }

  .orion-code-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 12px;
    background: #e8e8e8;
    border-bottom: 1px solid #ddd;
    font-size: 11px;
    font-weight: 600;
    color: #666;
  }

  .orion-code-body {
    padding: 12px;
    overflow-x: auto;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    line-height: 1.4;
    color: #333;
  }

  .orion-code-copy {
    padding: 2px 8px;
    background: transparent;
    border: none;
    color: #666;
    cursor: pointer;
    font-size: 11px;
    border-radius: 4px;
    transition: background 0.12s;
  }

  .orion-code-copy:hover { background: rgba(0,0,0,0.08); color: #0a0a0a; }

  .orion-input-area {
    flex-shrink: 0;
    padding: 16px 40px;
    background: #fff;
    border-top: 1px solid var(--border-light);
  }

  .orion-input-box {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    padding: 8px 12px;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    background: #fff;
    transition: border-color 0.12s;
  }

  .orion-input-box:focus-within { border-color: #999; }

  #orion-input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-family: inherit;
    font-size: 13px;
    resize: none;
    max-height: 120px;
    color: #0a0a0a;
  }

  #orion-input::placeholder { color: #bbb; }

  .orion-controls-row {
    display: flex;
    align-items: center;
    gap: 4px;
    padding-top: 8px;
    border-top: 1px solid #e8e8e8;
  }

  .orion-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 8px;
    background: #f0f0ee;
    border: 1px solid #ddd;
    border-radius: 6px;
    font-size: 11px;
    color: #666;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s;
  }

  .orion-chip:hover { background: #e8e8e8; }

  .orion-chip svg { width: 12px; height: 12px; }

  .orion-add-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 1px solid #ddd;
    background: transparent;
    color: #999;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s;
  }

  .orion-add-btn:hover { background: #f0f0ee; border-color: #ccc; color: #0a0a0a; }

  .orion-add-btn svg { width: 14px; height: 14px; }

  .orion-model-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: #f0f0ee;
    border: none;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    color: #666;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s;
  }

  .orion-model-pill:hover { background: #e8e8e8; }

  .orion-model-pill svg { width: 10px; height: 10px; opacity: 0.55; }

  .orion-send-btn {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: none;
    background: #000;
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, transform 0.15s;
    flex-shrink: 0;
  }
  .orion-send-btn:hover { background: #333; transform: scale(1.04); }
  .orion-send-btn:disabled { background: #e0e0e0; color: #bbb; cursor: default; transform: none; }
  .orion-send-btn svg { width: 15px; height: 15px; }

  .orion-hint {
    text-align: center;
    font-size: 11px;
    color: #ccc;
    margin-top: 6px;
  }

  .orion-search-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    background: #f0f0ee;
    border: none;
    border-radius: 6px;
    font-size: 11px;
    color: #666;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.12s;
  }

  .orion-search-pill:hover { background: #e8e8e8; }

  .orion-search-pill svg { width: 12px; height: 12px; }

  .orion-new-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 10px 10px 6px;
    padding: 9px 14px;
    background: transparent;
    color: #0a0a0a;
    border: 1px solid #e0e0e0;
    font-family: inherit;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
    border-radius: 6px;
    text-align: left;
    transition: background 0.15s, border-color 0.15s;
  }
  .orion-new-btn:hover { background: #f0f0ee; border-color: rgba(0,0,0,0.2); }
  .orion-new-btn svg { flex-shrink: 0; }

  /* History section label */
  .orion-section-label {
    padding: 10px 16px 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #aaa;
    text-transform: uppercase;
  }

  .orion-history-item {
    padding: 8px 10px;
    margin: 2px 8px;
    border-radius: 6px;
    font-size: 12px;
    color: #888;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    border-left: 2px solid transparent;
    transition: background 0.12s, color 0.12s;
  }

  .orion-history-item:hover { background: #f0f0ee; color: #333; }

  .orion-history-item.active {
    background: #e8e8e8;
    color: #0a0a0a;
    border-left-color: #0a0a0a;
    font-weight: 600;
  }

  /* Typing indicator */
  .orion-typing-dots {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .ponder-label {
    font-size: 11px;
    color: #888;
    transition: opacity 0.3s;
  }

  .ponder-star {
    animation: star-blink 0.6s infinite;
  }

  @keyframes star-blink {
    0%, 49%, 100% { opacity: 0.3; }
    50%, 99% { opacity: 1; }
  }

  .ponder-bars {
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .ponder-bars span {
    width: 3px;
    height: 8px;
    background: #666;
    border-radius: 1px;
    animation: bar-wave 0.6s infinite;
  }

  .ponder-bars span:nth-child(1) { animation-delay: 0s; }
  .ponder-bars span:nth-child(2) { animation-delay: 0.1s; }
  .ponder-bars span:nth-child(3) { animation-delay: 0.2s; }

  @keyframes bar-wave {
    0%, 49%, 100% { height: 8px; opacity: 0.5; }
    50%, 99% { height: 14px; opacity: 1; }
  }

  /* Modal */
  .orion-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .orion-modal.open { display: flex; }

  .orion-modal-content {
    background: #fff;
    border-radius: 12px;
    padding: 20px;
    max-width: 500px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  }

  .orion-modal-title {
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #0a0a0a;
  }

  .orion-modal-body {
    font-size: 13px;
    color: #666;
    margin-bottom: 16px;
    line-height: 1.6;
  }

  .orion-modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .orion-modal-btn {
    padding: 6px 14px;
    border-radius: 6px;
    border: none;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s;
  }

  .orion-modal-btn.primary {
    background: #0a0a0a;
    color: #fff;
  }

  .orion-modal-btn.primary:hover { background: #333; }

  .orion-modal-btn.secondary {
    background: #e8e8e8;
    color: #0a0a0a;
  }

  .orion-modal-btn.secondary:hover { background: #d8d8d6; }

  /* Voice overlay */
  .voice-overlay {
    position: fixed;
    inset: 0;
    background: rgba(255,255,255,0.92);
    z-index: 500;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    backdrop-filter: blur(2px);
    border-top: 1px solid var(--border-light);
  }

  .voice-status {
    font-size: 12px;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .voice-transcript {
    font-size: 14px;
    color: #0a0a0a;
    text-align: center;
    max-width: 80%;
    line-height: 1.6;
  }

  .voice-mic-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #0a0a0a;
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse-mic 1s infinite;
  }

  @keyframes pulse-mic {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.1); opacity: 0.7; }
  }

  .voice-controls {
    display: flex;
    gap: 8px;
  }

  .voice-mic-toggle-btn, .voice-close-pill-btn {
    padding: 8px 14px;
    border-radius: 6px;
    border: none;
    background: #e8e8e8;
    color: #0a0a0a;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.12s;
  }

  .voice-mic-toggle-btn:hover, .voice-close-pill-btn:hover { background: #ddd; }

  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
  }

  .modal-overlay.open { display: flex; }

  .model-selector-modal {
    background: #fff;
    border-radius: 8px;
    padding: 20px;
    max-width: 400px;
    max-height: 60vh;
    overflow-y: auto;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  }

  .model-selector-modal h3 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    color: #0a0a0a;
  }

  .model-option {
    padding: 10px 12px;
    margin: 4px 0;
    border: 1px solid #ddd;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: #666;
    transition: background 0.12s;
  }

  .model-option:hover { background: #f0f0ee; }

  .model-option.selected {
    background: #0a0a0a;
    color: #fff;
    border-color: #0a0a0a;
  }

  /* Music player styles */
  #canvas {
    display: block;
    width: 100%;
    height: 100%;
    position: absolute;
    top: 0;
    left: 0;
  }

  #ui {
    position: absolute;
    width: 100%;
    height: 100%;
    display:flex;
    flex-direction:column;
    font-family:'Orbitron', sans-serif;
    font-weight:900;
    font-size: 12px;
    letter-spacing:0.15em;
  }

  #bottom {
    position: static;
    width: 100%;
    padding: 8px 14px;
    display:flex;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 8px;
    background: var(--bg);
    pointer-events: all;
  }

  .ctrl-group { display:flex; gap:6px; align-items:center; justify-content:center; flex-wrap:wrap; }

  button, label {
    border:1px solid #000;
    background: rgba(0,0,0,0.03);
    color:#000;
    padding:4px 8px;
    font-size: 11px;
    cursor:pointer;
  }

  button:hover { background: rgba(0,0,0,0.08); }

  #bottom button {
    min-width: 26px;
    text-align:center;
  }

  input[type="file"] { display:none; }

  #trackInfo {
    font-size:10px;
    opacity:0.6;
    max-width: 60px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* volume slider */
  #volume {
    -webkit-appearance: none;
    width: 50px;
    height: 5px;
    border-radius: 3px;
    background: linear-gradient(to right, #000 50%, rgba(0,0,0,0.15) 50%);
    cursor: pointer;
  }

  /* wave orb visualizer */
  .wave-orb {
    width: 44px; height: 44px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .wave-orb-inner {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: #fff;
    box-shadow: inset 0 0 10px rgba(0,0,0,0.1), 0 0 20px rgba(0,0,0,0.2);
    position: relative;
    overflow: hidden;
  }
  .wave-orb-bars {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  .wave-orb-bars span {
    width: 2px;
    height: 60%;
    background: #000;
    border-radius: 1px;
  }

  /* Load button with plus icon */
  label[for="audioFolder"] {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    padding: 0;
  }

  label[for="audioFolder"] svg {
    width: 14px;
    height: 14px;
    stroke: currentColor;
    stroke-width: 2;
  }
</style>
</head>
